<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Yarnside — Showcase (preview)</title>
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      /* Brand palette — soft sage-aqua, ocean/outdoors */
      --bg: #c7d8cb;
      --ink: #3b362e;
      --muted: rgba(59, 54, 46, 0.62);
      --terracotta: #c07a4e;
      --terracotta-dark: #a8663d;
      /* Per-card fan step — overridden on smaller screens */
      --step-x: 80%;
      --step-y: 20%;
      --step-rot: 12deg;
      --ease: cubic-bezier(0, 0.02, 0, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      overflow: hidden;
      font-family: "Nunito Sans", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 28% 18%, #d6e3d8 0%, transparent 60%),
        radial-gradient(circle at 80% 85%, #bcd0c2 0%, transparent 55%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /*--------------------  Carousel  --------------------*/
    .carousel {
      position: relative;
      z-index: 1;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      pointer-events: none;
    }

    .carousel-item {
      --width: clamp(180px, 30vw, 310px);
      --height: clamp(240px, 42vw, 420px);
      --x: calc(var(--offset) * var(--step-x));
      --y: calc(var(--offset) * var(--step-y));
      --rot: calc(var(--offset) * var(--step-rot));
      position: absolute;
      z-index: var(--zIndex);
      top: 50%;
      left: 50%;
      width: var(--width);
      height: var(--height);
      margin: calc(var(--height) * -0.5) 0 0 calc(var(--width) * -0.5);
      border-radius: 14px;
      overflow: hidden;
      background: #e7eee8;
      box-shadow: 0 18px 45px -15px rgba(45, 60, 50, 0.45);
      transform-origin: 0% 100%;
      transform: translate(var(--x), var(--y)) rotate(var(--rot));
      will-change: transform;
      user-select: none;
      pointer-events: all;
      cursor: pointer;
    }

    .carousel-box {
      position: absolute;
      inset: 0;
      opacity: var(--box-opacity, 1);
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    /*--------------------  Chrome / UI  --------------------*/
    .brand {
      position: fixed;
      z-index: 5;
      top: 30px;
      left: 36px;
      font-family: "Fraunces", Georgia, serif;
      font-size: 24px;
      letter-spacing: 0.5px;
      pointer-events: none;
    }

    /* Per-product copy, top-right, cross-fades between products */
    .copy {
      position: fixed;
      z-index: 5;
      top: 72px;
      right: 36px;
      max-width: 300px;
      text-align: right;
      opacity: 1;
      transition: opacity .35s var(--ease);
      pointer-events: none;
    }
    .copy.is-out { opacity: 0; }
    .copy-kicker {
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--terracotta-dark);
      margin-bottom: 8px;
    }
    .copy-title {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 600;
      font-size: clamp(22px, 3vw, 31px);
      line-height: 1.05;
    }
    .copy-desc {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
    }

    /* Vertical tagline, bottom-right */
    .vbar {
      position: fixed;
      z-index: 5;
      right: 30px;
      bottom: 26px;
      transform-origin: 100% 100%;
      transform: rotate(-90deg);
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      pointer-events: none;
    }

    /* Get in touch + Instagram, bottom-left */
    .actions {
      position: fixed;
      z-index: 6;
      left: 36px;
      bottom: 26px;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .cta {
      display: inline-block;
      padding: 0.72rem 1.5rem;
      border-radius: 99px;
      background: var(--terracotta);
      color: #fdf6ee;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      transition: transform .25s var(--ease), background .25s var(--ease);
    }
    .cta:hover { background: var(--terracotta-dark); transform: translateY(-2px); }
    .ig {
      width: 26px; height: 26px;
      color: var(--ink);
      opacity: .6;
      transition: opacity .25s var(--ease);
    }
    .ig:hover { opacity: 1; }

    .hint {
      position: fixed;
      z-index: 5;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      pointer-events: none;
    }

    /*--------------------  Responsive fan  --------------------*/
    @media (max-width: 900px) {
      :root { --step-x: 62%; --step-y: 19%; --step-rot: 10deg; }
      .copy { max-width: 230px; }
    }
    @media (max-width: 600px) {
      :root { --step-x: 46%; --step-y: 16.5%; --step-rot: 7.8deg; }
      .carousel-item { --width: clamp(160px, 52vw, 240px); --height: clamp(220px, 72vw, 330px); }
      .vbar, .hint { display: none; }
      .brand { top: 22px; left: 22px; font-size: 21px; }
      .copy { top: 56px; right: 22px; max-width: 56vw; }
      .copy-desc { font-size: 12.5px; }
      .actions { left: 50%; transform: translateX(-50%); bottom: 22px; }
    }
  </style>
</head>
<body>
  <main class="carousel" id="carousel"></main>

  <div class="brand">Yarnside</div>

  <div class="copy" id="copy">
    <div class="copy-kicker" id="copyKicker"></div>
    <h2 class="copy-title" id="copyTitle"></h2>
    <p class="copy-desc" id="copyDesc"></p>
  </div>

  <div class="vbar">Handmade crochet · made with care</div>

  <div class="actions">
    <a class="cta" href="mailto:hello@yarnside.com.au">Get in touch</a>
    <a class="ig" href="#" aria-label="Instagram" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <rect x="3" y="3" width="18" height="18" rx="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"/>
      </svg>
    </a>
  </div>

  <div class="hint">Scroll / drag to explore</div>

  <script>
    /*--------------------  Data  --------------------*/
    // Grouped by product, in file order. Copy is per-product (starter text — tweak away).
    const PRODUCTS = [
      {
        slug: "bucket", kicker: "Headwear", title: "Bucket Hat", start: 1, count: 10,
        desc: "Hand-crocheted bucket hats in coastal colourways — structured enough to hold their shape, soft enough to roll into your beach bag.",
      },
      {
        slug: "beanie", kicker: "Headwear", title: "Yarnside Beanie", start: 11, count: 9,
        desc: "Snug, richly textured beanies for cold starts and windy headlands. Made in small batches, so no two are ever quite the same.",
      },
      {
        slug: "placemat", kicker: "Homeware", title: "Placemat", start: 20, count: 3,
        desc: "Chunky crocheted placemats that bring a little handmade warmth to the table, in natural tones that sit with anything.",
      },
      {
        slug: "coaster", kicker: "Homeware", title: "Coaster", start: 23, count: 6,
        desc: "Tactile, round coasters with plenty of character — a small handmade touch for the everyday surfaces around your home.",
      },
    ];

    const pad3 = (n) => String(n).padStart(3, "0");

    const carousel = document.getElementById("carousel");
    const cardProduct = []; // card index -> product
    PRODUCTS.forEach((p) => {
      for (let i = 0; i < p.count; i++) {
        const file = `assets/images/${pad3(p.start + i)}-${p.slug}.webp`;
        const el = document.createElement("div");
        el.className = "carousel-item";
        el.innerHTML = `
          <div class="carousel-box">
            <img src="${file}" alt="${p.title}" loading="lazy" decoding="async" draggable="false" />
          </div>`;
        carousel.appendChild(el);
        cardProduct.push(p);
      }
    });

    /*--------------------  Copy panel (per-product cross-fade)  --------------------*/
    const copyEl = document.getElementById("copy");
    const copyKicker = document.getElementById("copyKicker");
    const copyTitle = document.getElementById("copyTitle");
    const copyDesc = document.getElementById("copyDesc");

    let activeProduct = null;
    let copyTimer = null;

    const paintCopy = (p) => {
      copyKicker.textContent = p.kicker;
      copyTitle.textContent = p.title;
      copyDesc.textContent = p.desc;
    };

    const setCopy = (p) => {
      if (!p || p.slug === activeProduct) return;
      const first = activeProduct === null;
      activeProduct = p.slug;
      if (first) { paintCopy(p); return; }   // no fade on first paint
      copyEl.classList.add("is-out");
      clearTimeout(copyTimer);
      copyTimer = setTimeout(() => {
        paintCopy(p);
        copyEl.classList.remove("is-out");
      }, 350);
    };

    /*--------------------  State  --------------------*/
    const items = [...document.querySelectorAll(".carousel-item")];
    const N = items.length;

    let progress = 50;        // rendered (eased) value
    let target = 50;          // input target
    let startX = 0;
    let isDown = false;
    let dragDist = 0;

    const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
    const EASE = reduceMotion ? 1 : 0.085;
    const SPEED_WHEEL = 0.025;
    const SPEED_DRAG = -0.12;

    const clamp = (v, a, b) => Math.max(a, Math.min(v, b));
    const lerp = (a, b, n) => a + (b - a) * n;

    // initial copy
    setCopy(cardProduct[Math.round((progress / 100) * (N - 1))]);

    /*--------------------  Render loop  --------------------*/
    function render() {
      target = clamp(target, 0, 100);
      progress = lerp(progress, target, EASE);

      const active = (progress / 100) * (N - 1);   // FLOAT → continuous motion
      const front = clamp(Math.round(active), 0, N - 1);

      items.forEach((item, index) => {
        const offset = index - active;
        const dist = Math.abs(offset);
        item.style.setProperty("--offset", offset);
        item.style.setProperty("--zIndex", N - Math.abs(index - front));
        item.style.setProperty("--box-opacity", clamp(1 - dist / 4, 0, 1));
      });

      setCopy(cardProduct[front]);
      requestAnimationFrame(render);
    }
    render();

    /*--------------------  Input → target only  --------------------*/
    addEventListener("wheel", (e) => { target += e.deltaY * SPEED_WHEEL; }, { passive: true });

    const pointerDown = (e) => { isDown = true; dragDist = 0; startX = e.clientX ?? e.touches?.[0]?.clientX ?? 0; };
    const pointerUp = () => { isDown = false; };
    const pointerMove = (e) => {
      if (!isDown) return;
      const x = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
      const dx = x - startX;
      dragDist += Math.abs(dx);
      target += dx * SPEED_DRAG;
      startX = x;
    };

    addEventListener("mousedown", pointerDown);
    addEventListener("mousemove", pointerMove);
    addEventListener("mouseup", pointerUp);
    addEventListener("touchstart", pointerDown, { passive: true });
    addEventListener("touchmove", pointerMove, { passive: true });
    addEventListener("touchend", pointerUp);

    // click a card to bring it to centre (ignored if the press was a drag)
    items.forEach((item, i) => item.addEventListener("click", () => {
      if (dragDist > 8) return;
      target = (i / (N - 1)) * 100;
    }));

    // keyboard
    addEventListener("keydown", (e) => {
      const step = 100 / (N - 1);
      if (e.key === "ArrowRight" || e.key === "ArrowDown") target += step;
      if (e.key === "ArrowLeft" || e.key === "ArrowUp") target -= step;
    });
  </script>
</body>
</html>
